<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ex2 — Statistical Visualization (Plotly)</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="data/data.js"></script>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; max-width: 1100px; margin: 24px auto; padding: 0 16px; color: #222; }
    h1 { font-size: 1.4rem; }
    p.note { color: #555; font-size: 0.95rem; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    @media (max-width: 800px) { .row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <h1>Distributions and relationships</h1>
  <p class="note">
    Two charts research papers actually use:
    <strong>(left)</strong> a box plot showing how tweet volume per 30-minute interval is distributed within each hashtag, and
    <strong>(right)</strong> a scatter plot of sentiment vs. tweet volume with an OLS regression line.
  </p>

  <div class="row">
    <div id="boxplot" style="height:480px;"></div>
    <div id="scatter" style="height:480px;"></div>
  </div>

<script>
const rows = CORONA_TWEETS.map(d => ({
  hashtag: d.hashtag,
  tweet_count: +d.tweet_count,
  avg_sentiment: +d.avg_sentiment
}));

// ---- Box plot: tweet_count grouped by hashtag ----
const hashtags = Array.from(new Set(rows.map(d => d.hashtag)));
const boxTraces = hashtags.map(h => ({
  y: rows.filter(d => d.hashtag === h).map(d => d.tweet_count),
  name: h,
  type: "box",
  boxpoints: "outliers"
}));
Plotly.newPlot("boxplot", boxTraces, {
  title: "Tweet count distribution per hashtag",
  yaxis: { title: "Tweets per 30 min" },
  showlegend: false,
  margin: { t: 50, l: 50, r: 20, b: 50 }
}, { responsive: true });

// ---- Scatter + OLS regression line ----
// Compute slope/intercept manually so the trend line shows up.
const xs = rows.map(d => d.avg_sentiment);
const ys = rows.map(d => d.tweet_count);
const n = xs.length;
const meanX = d3.mean(xs), meanY = d3.mean(ys);
const slope = d3.sum(xs.map((x, i) => (x - meanX) * (ys[i] - meanY))) /
              d3.sum(xs.map(x => (x - meanX) ** 2));
const intercept = meanY - slope * meanX;

// Pearson r for the annotation
const sx = Math.sqrt(d3.sum(xs.map(x => (x - meanX) ** 2)) / (n - 1));
const sy = Math.sqrt(d3.sum(ys.map(y => (y - meanY) ** 2)) / (n - 1));
const r = d3.sum(xs.map((x, i) => (x - meanX) * (ys[i] - meanY))) / ((n - 1) * sx * sy);

const xLine = [d3.min(xs), d3.max(xs)];
const yLine = xLine.map(x => slope * x + intercept);

const points = {
  x: xs, y: ys, mode: "markers", type: "scatter",
  name: "observations",
  marker: { size: 6, opacity: 0.55,
            color: rows.map(d => hashtags.indexOf(d.hashtag)) }
};
const line = {
  x: xLine, y: yLine, mode: "lines", type: "scatter",
  name: `OLS fit (r = ${r.toFixed(2)})`,
  line: { width: 2, color: "#444" }
};

Plotly.newPlot("scatter", [points, line], {
  title: "Sentiment vs. tweet volume",
  xaxis: { title: "Average sentiment" },
  yaxis: { title: "Tweets per 30 min" },
  margin: { t: 50, l: 50, r: 20, b: 50 },
  legend: { x: 0.02, y: 0.98 }
}, { responsive: true });
</script>
</body>
</html>
