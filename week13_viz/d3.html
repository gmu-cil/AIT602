<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>D3 — Twitter Follower Network</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="data/data.js"></script>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; max-width: 1100px; margin: 24px auto; padding: 0 16px; color: #222; }
    h1 { font-size: 1.4rem; }
    p.note { color: #555; font-size: 0.95rem; }
    svg { background: #fafafa; border: 1px solid #ddd; border-radius: 4px; cursor: grab; }
    svg:active { cursor: grabbing; }
    .links line { stroke: #aaa; stroke-opacity: 0.6; }
    .nodes circle { stroke: #fff; stroke-width: 1.5px; }
    .nodes text { pointer-events: none; font: 11px sans-serif; fill: #222; }
  </style>
</head>
<body>
  <h1>Follower network around <code>@fairfaxhealth</code></h1>
  <p class="note">
    Real subgraph from <code>week10_twitter_network/data/links.csv</code>: top-60 most-connected accounts and the edges between them.
    Loaded from <code>data/data.js</code> as <code>window.TWITTER_NETWORK</code>. Drag any node; the layout reflows via D3 force simulation.
  </p>

  <svg id="graph" width="1000" height="640"></svg>

<script>
const svg = d3.select("#graph");
const width = +svg.attr("width");
const height = +svg.attr("height");

// Clone so the simulation's mutations don't reach the shared global.
const graph = {
  nodes: TWITTER_NETWORK.nodes.map(n => ({ ...n })),
  links: TWITTER_NETWORK.links.map(l => ({ ...l })),
};

const color = d3.scaleOrdinal(d3.schemeCategory10);

// Size node by degree (square-root scale keeps the hub from dominating).
const radius = d3.scaleSqrt()
  .domain(d3.extent(graph.nodes, d => d.degree))
  .range([4, 22]);

const simulation = d3.forceSimulation(graph.nodes)
  .force("link", d3.forceLink(graph.links).id(d => d.id).distance(60))
  .force("charge", d3.forceManyBody().strength(-120))
  .force("center", d3.forceCenter(width / 2, height / 2))
  .force("collide", d3.forceCollide(d => radius(d.degree) + 2));

const link = svg.append("g")
    .attr("class", "links")
  .selectAll("line")
  .data(graph.links)
  .join("line")
    .attr("stroke-width", 1);

const node = svg.append("g")
    .attr("class", "nodes")
  .selectAll("g")
  .data(graph.nodes)
  .join("g")
  .call(d3.drag()
    .on("start", dragStart)
    .on("drag",  dragMove)
    .on("end",   dragEnd));

node.append("circle")
    .attr("r", d => radius(d.degree))
    .attr("fill", d => color(Math.min(d.degree, 9)))
    .append("title")
    .text(d => `@${d.name} — degree ${d.degree}`);

// Only label nodes with degree ≥ 3 to avoid clutter on the leaves.
node.filter(d => d.degree >= 3)
    .append("text")
    .attr("dx", d => radius(d.degree) + 3)
    .attr("dy", "0.35em")
    .text(d => "@" + d.name);

simulation.on("tick", () => {
  link
    .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
    .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
  node.attr("transform", d => `translate(${d.x},${d.y})`);
});

function dragStart(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragMove(event, d)  { d.fx = event.x; d.fy = event.y; }
function dragEnd(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null; d.fy = null;
}
</script>
</body>
</html>
