<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ex1 — Tweet Volume Over Time (Plotly)</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="data/data.js"></script>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; max-width: 960px; margin: 24px auto; padding: 0 16px; color: #222; }
    h1 { font-size: 1.4rem; }
    p.note { color: #555; font-size: 0.95rem; }
    code { background: #f3f3f3; padding: 1px 4px; border-radius: 3px; }
  </style>
</head>
<body>
  <h1>Tweets per 30 minutes, by hashtag</h1>
  <p class="note">Data is loaded from <code>data/data.js</code>, which exposes <code>window.CORONA_TWEETS</code>. One line per hashtag.</p>
  <div id="chart" style="width:100%; height:480px;"></div>

<script>
// 1. Convert raw rows: parse timestamp into a Date, keep numeric fields as numbers.
const rows = CORONA_TWEETS.map(d => ({
  timestamp: new Date(d.timestamp),
  hashtag: d.hashtag,
  tweet_count: +d.tweet_count,
  avg_sentiment: +d.avg_sentiment
}));

// 2. Group rows by hashtag. d3.group returns a Map: hashtag -> [row, row, ...]
const byHashtag = d3.group(rows, d => d.hashtag);

// 3. Build one Plotly trace per hashtag.
const traces = Array.from(byHashtag, ([hashtag, items]) => ({
  x: items.map(d => d.timestamp),
  y: items.map(d => d.tweet_count),
  name: hashtag,
  mode: "lines+markers",
  type: "scatter"
}));

const layout = {
  margin: { t: 20, r: 20, b: 50, l: 50 },
  xaxis: { title: "Time" },
  yaxis: { title: "Tweets per 30 min" },
  legend: { orientation: "h", y: -0.2 }
};

Plotly.newPlot("chart", traces, layout, { responsive: true });
</script>
</body>
</html>
