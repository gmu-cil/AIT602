<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ex3 — Interactive Filter (Plotly)</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <script src="data/data.js"></script>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; max-width: 960px; margin: 24px auto; padding: 0 16px; color: #222; }
    h1 { font-size: 1.4rem; }
    p.note { color: #555; font-size: 0.95rem; }
    .controls { margin: 12px 0 18px; }
    label { font-weight: 600; }
    select { font-size: 1rem; padding: 4px 8px; }
  </style>
</head>
<body>
  <h1>Filter by hashtag</h1>
  <p class="note">Pick a hashtag to redraw the time series. Demonstrates dynamic data filtering with a dropdown.</p>

  <div class="controls">
    <label for="hashtag-select">Hashtag:</label>
    <select id="hashtag-select"></select>
  </div>

  <div id="chart" style="width:100%; height:460px;"></div>

<script>
const rows = CORONA_TWEETS.map(d => ({
  timestamp: new Date(d.timestamp),
  hashtag: d.hashtag,
  tweet_count: +d.tweet_count,
  avg_sentiment: +d.avg_sentiment
}));

const hashtags = Array.from(new Set(rows.map(d => d.hashtag))).sort();
const select = document.getElementById("hashtag-select");
for (const h of hashtags) {
  const opt = document.createElement("option");
  opt.value = h;
  opt.textContent = h;
  select.appendChild(opt);
}

function draw(hashtag) {
  const subset = rows.filter(d => d.hashtag === hashtag)
                     .sort((a, b) => a.timestamp - b.timestamp);
  const traces = [
    {
      x: subset.map(d => d.timestamp),
      y: subset.map(d => d.tweet_count),
      name: "Tweets / 30 min",
      mode: "lines+markers",
      type: "scatter",
      yaxis: "y1"
    },
    {
      x: subset.map(d => d.timestamp),
      y: subset.map(d => d.avg_sentiment),
      name: "Avg sentiment",
      mode: "lines",
      type: "scatter",
      yaxis: "y2",
      line: { dash: "dot" }
    }
  ];
  const layout = {
    title: `${hashtag} — volume and sentiment over time`,
    xaxis: { title: "Time" },
    yaxis: { title: "Tweets / 30 min", side: "left" },
    yaxis2: { title: "Sentiment", overlaying: "y", side: "right",
              zeroline: true, zerolinecolor: "#bbb" },
    margin: { t: 50, r: 60, b: 50, l: 60 },
    legend: { orientation: "h", y: -0.2 }
  };
  Plotly.react("chart", traces, layout, { responsive: true });
}

draw(hashtags[0]);
select.addEventListener("change", e => draw(e.target.value));
</script>
</body>
</html>
